name: "API Load Test"
# target can be overridden via env: TARGET_URL=https://my-api.example.com bacot run api-load-test.yaml
# Note: os.ExpandEnv is used — set TARGET_URL or the value is used as-is (no bash :- defaults)
target: "https://httpbin.org"

# Enable per-VU cookie jar (cookies set by Set-Cookie are automatically re-sent)
cookies: true

# Gradual ramp-up: 5 → 20 VUs over 10 s, sustain, then ramp down
stages:
  - duration: 10s
    start_vus: 5
    vus: 20
  - duration: 30s
    vus: 20
  - duration: 10s
    start_vus: 20
    vus: 5

scenarios:
  - name: "GET anything"
    method: GET
    path: /anything
    weight: 70
    headers:
      Accept: application/json
      # Authorization token injected from environment: API_TOKEN=mytoken bacot run ...
      Authorization: "Bearer ${API_TOKEN}"
    checks:
      - status == 200
      - duration < 2000
      - body_contains "url"                  # response body must mention "url"
      - json_path "$.url" == "https://httpbin.org/anything"
      - header "Content-Type" == "application/json"
    # Simulate user reading the response before the next request
    think_time:
      min_ms: 200
      max_ms: 800

  - name: "POST data"
    method: POST
    path: /post
    weight: 30
    body: '{"username":"test","value":42}'
    headers:
      Content-Type: application/json
    checks:
      - status == 200
      - status != 500
      - body_contains "username"             # echo back contains our field
      - json_path "$.json.value" == 42       # httpbin echoes JSON body under $.json
    think_time:
      min_ms: 500                            # constant 500 ms pause

thresholds:
  http_req_duration_p95: "< 3000ms"
  http_req_failed: "< 5%"
  http_req_duration_avg: "< 1000ms"
